          - componentInputParameter: cards_pvc_name
            mountPath: /data
            pvcNameParameter:
              componentInputParameter: cards_pvc_name
          tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Equal
            value: present
        exec-model-registry-component:
          pvcMount:
          - componentInputParameter: cards_pvc_name
            mountPath: /data
            pvcNameParameter:
              componentInputParameter: cards_pvc_name
        exec-preprocessing-component:
          pvcMount:
          - componentInputParameter: cards_pvc_name
            mountPath: /data
            pvcNameParameter:
              componentInputParameter: cards_pvc_name
        exec-pull-data-component:
          pvcMount:
          - componentInputParameter: cards_pvc_name
            mountPath: /data
            pvcNameParameter:
              componentInputParameter: cards_pvc_name
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: access_key_id
            - envVar: AWS_SECRET_ACCESS_KEY
