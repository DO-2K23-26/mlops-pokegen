          \ python3 -m pip install --quiet --no-warn-script-location 'dvc[gs,s3,ssh]'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef pull_data_component(\n    state_output: Output[Artifact],\n \
          \   repo_url: str = \"https://git.razano.dev/llabeyrie/mlops-dataset.git\"\
          ,\n    revision: str = \"main\",\n    remote_path: str = \"cards\",\n  \
          \  local_cards_dir: str = \"/tmp/data/raw/cards\",\n    aws_default_region:\
          \ str = \"auto\",\n) -> None:\n    \"\"\"Pull the card dataset from DVC-backed\
          \ storage and write the step state.\n\n    AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY\
          \ are injected as env vars\n    from a Kubernetes secret (use_secret_as_env\
          \ in the pipeline definition).\n    \"\"\"\n    import json\n    import\
          \ os\n    from pathlib import Path\n\n    from dvc.api import DVCFileSystem\n\
          \n    os.environ.setdefault(\"AWS_DEFAULT_REGION\", aws_default_region)\n\
          \n    local_dir = Path(local_cards_dir)\n    local_dir.parent.mkdir(parents=True,\
          \ exist_ok=True)\n\n    fs = DVCFileSystem(repo_url, rev=revision)\n   \
          \ fs.get(remote_path, str(local_dir), recursive=True)\n\n    n_png = len(list(fs.glob(f\"\
          {remote_path}/**/*.png\")))\n    payload = {\n        \"step\": \"00_pull_data\"\
          ,\n        \"cards_dir\": str(local_dir.resolve()),\n        \"n_png\":\
          \ n_png,\n    }\n\n    out = Path(state_output.path)\n    out.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    out.write_text(json.dumps(payload, indent=2, ensure_ascii=False),\
          \ encoding=\"utf-8\")\n    print(f\"Pull termine - {n_png} PNG sous {local_dir}\"\
          )\n\n"
        image: python:3.11
    exec-train-model-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model_component(\n    checkpoint_output: Output[Artifact],\n\
          \    state_output: Output[Artifact],\n    manifest_path: Input[Artifact],\n\
          \    model_id: str = \"runwayml/stable-diffusion-v1-5\",\n    epochs: int\
          \ = 1,\n    lr: float = 1e-5,\n    fraction: float = 1.0,\n    seed: int\
          \ = 42,\n    batch_size: int = 4,\n    num_workers: int = 4,\n    cards_pvc_name:\
          \ str = \"pokegen-data\",\n    namespace: str = \"pokegen\",\n    num_nodes:\
          \ int = 2,\n) -> None:\n    \"\"\"Submit a TrainJob (trainer.kubeflow.org/v1alpha1)\
          \ for DDP training across GPU nodes and poll for completion.\"\"\"\n   \
          \ import json\n    import time\n    import uuid\n    from pathlib import\
          \ Path\n\n    from kubernetes import client as k8s_client, config as k8s_config\n\
          \n    k8s_config.load_incluster_config()\n    custom_api = k8s_client.CustomObjectsApi()\n\
          \n    # Stage manifest onto the PVC so TrainJob pods can access it\n   \
          \ manifest_pvc_path = \"/data/manifests/train_manifest.json\"\n    p = Path(manifest_pvc_path)\n\
          \    p.parent.mkdir(parents=True, exist_ok=True)\n    p.write_text(Path(manifest_path.path).read_text(encoding=\"\
          utf-8\"), encoding=\"utf-8\")\n\n    checkpoint_pvc_path = \"/data/checkpoints/lora_checkpoint.pt\"\
          \n\n    _GIT_PKG = \"pokegen-shared @ git+https://github.com/DO-2K23-26/mlops-pokegen.git\"\
          \n    _TRAIN_IMAGE = \"pytorch/pytorch:2.2.1-cuda12.1-cudnn8-runtime\"\n\
          \n    train_cmd = \" \".join([\n        f\"pip install --quiet '{_GIT_PKG}'\
          \ &&\",\n        \"python -m shared.train_distributed\",\n        f\"--manifest-path\
          \ {manifest_pvc_path}\",\n        f\"--checkpoint-path {checkpoint_pvc_path}\"\
          ,\n        f\"--model-id {model_id}\",\n        f\"--epochs {epochs}\",\n\
          \        f\"--lr {lr}\",\n        f\"--fraction {fraction}\",\n        f\"\
          --seed {seed}\",\n        f\"--batch-size {batch_size}\",\n        f\"--num-workers\
          \ {num_workers}\",\n    ])\n\n    job_name = f\"pokegen-train-{uuid.uuid4().hex[:8]}\"\
          \n\n    trainjob = {\n        \"apiVersion\": \"trainer.kubeflow.org/v1alpha1\"\
          ,\n        \"kind\": \"TrainJob\",\n        \"metadata\": {\"name\": job_name,\
          \ \"namespace\": namespace},\n        \"spec\": {\n            \"runtimeRef\"\
          : {\n                \"name\": \"torch-distributed\",\n                \"\
          apiGroup\": \"trainer.kubeflow.org\",\n                \"kind\": \"ClusterTrainingRuntime\"\
          ,\n            },\n            \"trainer\": {\n                \"image\"\
          : _TRAIN_IMAGE,\n                \"command\": [\"bash\", \"-c\"],\n    \
          \            \"args\": [train_cmd],\n                \"numNodes\": num_nodes,\n\
          \                \"numProcPerNode\": 1,\n                \"resourcesPerNode\"\
          : {\n                    \"requests\": {\"nvidia.com/gpu\": \"1\", \"cpu\"\
          : \"12\", \"memory\": \"32Gi\"},\n                    \"limits\": {\"nvidia.com/gpu\"\
          : \"1\"},\n                },\n            },\n            \"runtimePatches\"\
          : [\n                {\n                    \"manager\": \"pokegen-pipeline\"\
          ,\n                    \"trainingRuntimeSpec\": {\n                    \
          \    \"template\": {\n                            \"spec\": {\n        \
          \                        \"replicatedJobs\": [\n                       \
          \             {\n                                        \"name\": \"node\"\
          ,\n                                        \"template\": {\n           \
          \                                 \"spec\": {\n                        \
          \                        \"template\": {\n                             \
          \                       \"spec\": {\n                                  \
          \                      \"tolerations\": [\n                            \
          \                                {\n                                   \
          \                             \"key\": \"nvidia.com/gpu\",\n           \
          \                                                     \"operator\": \"Equal\"\
          ,\n                                                                \"value\"\
          : \"present\",\n                                                       \
          \         \"effect\": \"NoSchedule\",\n                                \
          \                            }\n                                       \
          \                 ],\n                                                 \
          \       \"volumes\": [\n                                               \
          \             {\n                                                      \
          \          \"name\": \"data\",\n                                       \
          \                         \"persistentVolumeClaim\": {\n               \
          \                                                     \"claimName\": cards_pvc_name\n\
          \                                                                },\n  \
          \                                                          }\n         \
          \                                               ],\n                   \
          \                                     \"containers\": [\n              \
          \                                              {\n                     \
          \                                           \"name\": \"node\",\n      \
          \                                                          \"volumeMounts\"\
          : [\n                                                                  \
          \  {\n                                                                 \
          \       \"name\": \"data\",\n                                          \
          \                              \"mountPath\": \"/data\",\n             \
          \                                                       }\n            \
          \                                                    ],\n              \
          \                                              }\n                     \
          \                                   ],\n                               \
          \                     }\n                                              \
          \  }\n                                            }\n                  \
          \                      },\n                                    }\n     \
          \                           ]\n                            }\n         \
          \               }\n                    },\n                }\n         \
          \   ],\n        },\n    }\n\n    custom_api.create_namespaced_custom_object(\n\
          \        group=\"trainer.kubeflow.org\", version=\"v1alpha1\",\n       \
          \ namespace=namespace, plural=\"trainjobs\", body=trainjob,\n    )\n   \
          \ print(f\"TrainJob '{job_name}' submitted in namespace '{namespace}'\"\
          )\n\n    while True:\n        job = custom_api.get_namespaced_custom_object(\n\
          \            group=\"trainer.kubeflow.org\", version=\"v1alpha1\",\n   \
          \         namespace=namespace, plural=\"trainjobs\", name=job_name,\n  \
          \      )\n        phase = None\n        for cond in job.get(\"status\",\
          \ {}).get(\"conditions\", []):\n            if cond.get(\"status\") != \"\
          True\":\n                continue\n            if cond.get(\"type\") ==\
          \ \"Succeeded\":\n                phase = \"Succeeded\"\n            elif\
          \ cond.get(\"type\") == \"Failed\":\n                phase = \"Failed\"\n\
          \n        if phase == \"Succeeded\":\n            print(\"TrainJob succeeded\"\
          )\n            break\n        if phase == \"Failed\":\n            raise\
          \ RuntimeError(f\"TrainJob '{job_name}' failed\")\n\n        time.sleep(30)\n\
          \n    # Write checkpoint pointer so evaluation_component can find the file\
          \ on the PVC\n    ckpt_out = Path(checkpoint_output.path)\n    ckpt_out.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    ckpt_out.write_text(json.dumps({\"checkpoint_path\"\
          : checkpoint_pvc_path}), encoding=\"utf-8\")\n\n    # Read losses written\
          \ by rank-0 during training\n    results_path = Path(checkpoint_pvc_path).parent\
          \ / \"train_results.json\"\n    try:\n        results = json.loads(results_path.read_text())\n\
          \        train_losses = results.get(\"train_losses\", [])\n        val_losses\
          \ = results.get(\"val_losses\", [])\n    except Exception:\n        train_losses,\
          \ val_losses = [], []\n\n    out = Path(state_output.path)\n    out.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    out.write_text(json.dumps({\n        \"step\": \"\
          03_train_model\",\n        \"job_name\": job_name,\n        \"manifest_path\"\
          : manifest_pvc_path,\n        \"checkpoint_path\": checkpoint_pvc_path,\n\
          \        \"model_id\": model_id,\n        \"epochs_done\": len(train_losses),\n\
          \        \"final_train_loss\": train_losses[-1] if train_losses else None,\n\
          \        \"final_val_loss\": val_losses[-1] if val_losses else None,\n \
          \   }, indent=2, ensure_ascii=False), encoding=\"utf-8\")\n\n"
        image: python:3.11
        resources:
          accelerator:
            count: '1'
            resourceCount: '1'
            resourceType: nvidia.com/gpu
            type: nvidia.com/gpu
          cpuRequest: 12.0
          memoryRequest: 34.359738368
          resourceCpuRequest: '12'
          resourceMemoryRequest: 32Gi
pipelineInfo:
  description: "SD 1.5 LoRA fine-tune on Pok\xE9mon cards \u2014 pull \u2192 FE \u2192\
    \ preprocess \u2192 train \u2192 eval"
  name: pokegen-mlops
root:
  dag:
    tasks:
      evaluation-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluation-component
        dependentTasks:
        - preprocessing-component
        - train-model-component
        inputs:
          artifacts:
            checkpoint_path:
              taskOutputArtifact:
                outputArtifactKey: checkpoint_output
                producerTask: train-model-component
            manifest_path:
              taskOutputArtifact:
                outputArtifactKey: manifest_output
                producerTask: preprocessing-component
          parameters:
            guidance_scale:
              componentInputParameter: guidance_scale
            model_id:
              componentInputParameter: model_id
            num_inference_steps:
              componentInputParameter: num_inference_steps
            sample_count:
              componentInputParameter: sample_count
        taskInfo:
          name: evaluation-component
      feature-engineering-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-feature-engineering-component
        dependentTasks:
        - pull-data-component
        inputs:
          artifacts:
            input_results_dataset:
              taskOutputArtifact:
                outputArtifactKey: state_output
                producerTask: pull-data-component
          parameters:
            user_prompt:
              componentInputParameter: user_prompt
        taskInfo:
          name: feature-engineering-component
      model-registry-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-model-registry-component
        dependentTasks:
        - evaluation-component
        - train-model-component
        inputs:
          artifacts:
            checkpoint_path:
              taskOutputArtifact:
                outputArtifactKey: checkpoint_output
                producerTask: train-model-component
            evaluation_state:
              taskOutputArtifact:
                outputArtifactKey: state_output
                producerTask: evaluation-component
        taskInfo:
          name: model-registry-component
      preprocessing-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-preprocessing-component
        dependentTasks:
        - feature-engineering-component
        - pull-data-component
        inputs:
          artifacts:
            image_dir:
              taskOutputArtifact:
                outputArtifactKey: state_output
                producerTask: pull-data-component
          parameters:
            batch_size:
              componentInputParameter: batch_size
            img_size:
              componentInputParameter: img_size
            split_seed:
              componentInputParameter: split_seed
            val_fraction:
              componentInputParameter: val_fraction
        taskInfo:
          name: preprocessing-component
      pull-data-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-pull-data-component
        inputs:
          parameters:
            local_cards_dir:
              runtimeValue:
                constant: /data/raw/cards
            repo_url:
              componentInputParameter: repo_url
            revision:
              componentInputParameter: revision
        taskInfo:
          name: pull-data-component
      train-model-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-model-component
        dependentTasks:
        - preprocessing-component
        inputs:
          artifacts:
            manifest_path:
              taskOutputArtifact:
                outputArtifactKey: manifest_output
                producerTask: preprocessing-component
          parameters:
            batch_size:
              componentInputParameter: batch_size
            epochs:
              componentInputParameter: epochs
            fraction:
              componentInputParameter: train_fraction
            lr:
              componentInputParameter: lr
            model_id:
              componentInputParameter: model_id
        taskInfo:
          name: train-model-component
  inputDefinitions:
    parameters:
      batch_size:
        defaultValue: 4.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      cards_pvc_name:
        defaultValue: pokegen-data
        isOptional: true
        parameterType: STRING
      epochs:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      guidance_scale:
        defaultValue: 7.5
        isOptional: true
        parameterType: NUMBER_DOUBLE
      img_size:
        defaultValue: 512.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      lr:
        defaultValue: 1.0e-05
        isOptional: true
        parameterType: NUMBER_DOUBLE
      model_id:
        defaultValue: runwayml/stable-diffusion-v1-5
        isOptional: true
        parameterType: STRING
      num_inference_steps:
        defaultValue: 10.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      r2_secret_name:
        defaultValue: cloudflare-r2-keys
        isOptional: true
        parameterType: STRING
      repo_url:
        defaultValue: https://git.razano.dev/llabeyrie/mlops-dataset.git
        isOptional: true
        parameterType: STRING
      revision:
        defaultValue: main
        isOptional: true
        parameterType: STRING
      sample_count:
        defaultValue: 4.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      split_seed:
        defaultValue: 42.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      train_fraction:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_DOUBLE
      user_prompt:
        defaultValue: A fierce fire dragon pokemon with wings and a blazing tail attack
        isOptional: true
        parameterType: STRING
      val_fraction:
        defaultValue: 0.1
        isOptional: true
        parameterType: NUMBER_DOUBLE
