            optional: false
            secretNameParameter:
              componentInputParameter: r2_secret_name
        exec-train-model-component:
          pvcMount:
          - componentInputParameter: cards_pvc_name
            mountPath: /data
            pvcNameParameter:
              componentInputParameter: cards_pvc_name
          tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Equal
            value: present
