# PIPELINE DEFINITION
# Name: pokegen-mlops
# Description: SD 1.5 LoRA fine-tune on Pokémon cards — pull → FE → preprocess → train → eval
# Inputs:
#    batch_size: int [Default: 4.0]
#    cards_pvc_name: str [Default: 'pokegen-data']
#    epochs: int [Default: 1.0]
#    guidance_scale: float [Default: 7.5]
#    img_size: int [Default: 512.0]
#    lr: float [Default: 1e-05]
#    model_id: str [Default: 'runwayml/stable-diffusion-v1-5']
#    num_inference_steps: int [Default: 10.0]
#    r2_secret_name: str [Default: 'cloudflare-r2-keys']
#    repo_url: str [Default: 'https://git.razano.dev/llabeyrie/mlops-dataset.git']
#    revision: str [Default: 'main']
#    sample_count: int [Default: 4.0]
#    split_seed: int [Default: 42.0]
#    train_fraction: float [Default: 1.0]
#    user_prompt: str [Default: 'A fierce fire dragon pokemon with wings and a blazing tail attack']
#    val_fraction: float [Default: 0.1]
components:
  comp-evaluation-component:
    executorLabel: exec-evaluation-component
    inputDefinitions:
      artifacts:
        checkpoint_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        manifest_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        guidance_scale:
          defaultValue: 7.5
          isOptional: true
          parameterType: NUMBER_DOUBLE
        model_id:
          defaultValue: runwayml/stable-diffusion-v1-5
          isOptional: true
          parameterType: STRING
        num_inference_steps:
          defaultValue: 100.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        sample_count:
          defaultValue: 4.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        loss_curves_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        metrics_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        samples_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        state_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-feature-engineering-component:
    executorLabel: exec-feature-engineering-component
    inputDefinitions:
      artifacts:
        input_results_dataset:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        user_prompt:
          defaultValue: A fierce fire dragon pokemon with wings and a blazing tail
            attack
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      artifacts:
        metadata_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        state_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-model-registry-component:
    executorLabel: exec-model-registry-component
    inputDefinitions:
      artifacts:
        checkpoint_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        evaluation_state:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        author:
          defaultValue: pokegen-pipeline
          isOptional: true
          parameterType: STRING
        kubeflow_namespace:
          defaultValue: pokegen
          isOptional: true
          parameterType: STRING
        model_name:
          defaultValue: pokegen-lora-sd15
          isOptional: true
          parameterType: STRING
        registry_host:
          defaultValue: http://model-registry-service.default.svc.cluster.local
          isOptional: true
          parameterType: STRING
        registry_port:
          defaultValue: 8080.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        state_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-preprocessing-component:
    executorLabel: exec-preprocessing-component
    inputDefinitions:
      artifacts:
        image_dir:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        batch_size:
          defaultValue: 4.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        img_size:
          defaultValue: 512.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        num_workers:
          defaultValue: 0.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        split_seed:
          defaultValue: 42.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        val_fraction:
          defaultValue: 0.1
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        manifest_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        state_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-pull-data-component:
    executorLabel: exec-pull-data-component
    inputDefinitions:
      parameters:
        aws_default_region:
          defaultValue: auto
          isOptional: true
          parameterType: STRING
        local_cards_dir:
          defaultValue: /tmp/data/raw/cards
          isOptional: true
          parameterType: STRING
        remote_path:
          defaultValue: cards
          isOptional: true
          parameterType: STRING
        repo_url:
          defaultValue: https://git.razano.dev/llabeyrie/mlops-dataset.git
          isOptional: true
          parameterType: STRING
        revision:
          defaultValue: main
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      artifacts:
        state_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-train-model-component:
    executorLabel: exec-train-model-component
    inputDefinitions:
      artifacts:
        manifest_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        batch_size:
          defaultValue: 4.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        epochs:
          defaultValue: 1.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        fraction:
          defaultValue: 1.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
        lr:
          defaultValue: 1.0e-05
          isOptional: true
          parameterType: NUMBER_DOUBLE
        model_id:
          defaultValue: runwayml/stable-diffusion-v1-5
          isOptional: true
          parameterType: STRING
        num_workers:
          defaultValue: 0.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        seed:
          defaultValue: 42.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        checkpoint_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        state_output:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-evaluation-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluation_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'torch' 'diffusers'\
          \ 'pillow' 'matplotlib' 'transformers' 'pokegen-shared @ git+https://github.com/DO-2K23-26/mlops-pokegen.git'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluation_component(\n    metrics_output: Output[Artifact],\n\
          \    loss_curves_output: Output[Artifact],\n    samples_output: Output[Artifact],\n\
          \    state_output: Output[Artifact],\n    manifest_path: Input[Artifact],\n\
          \    checkpoint_path: Input[Artifact],\n    model_id: str = \"runwayml/stable-diffusion-v1-5\"\
          ,\n    num_inference_steps: int = 100,\n    guidance_scale: float = 7.5,\n\
          \    sample_count: int = 4,\n) -> None:\n    \"\"\"Plot training curves\
          \ and generate qualitative samples for evaluation.\"\"\"\n    import copy\n\
          \    import json\n    import random\n    from pathlib import Path\n\n  \
          \  import matplotlib.pyplot as plt\n    import torch\n    from diffusers\
          \ import StableDiffusionPipeline\n    from PIL import Image\n\n    from\
          \ shared.pokemon_dataset import (\n        build_loaders_from_manifest,\n\
          \        get_metadata_from_png,\n        metadata_to_conditioning,\n   \
          \     pick_device,\n    )\n    from shared.sd_lora_models import build_sd_lora_stack\n\
          \n    checkpoint = torch.load(checkpoint_path.path, map_location=\"cpu\"\
          , weights_only=False)\n    train_losses = checkpoint[\"train_losses\"]\n\
          \    val_losses = checkpoint[\"val_losses\"]\n\n    plt.figure(figsize=(8,\
          \ 4))\n    plt.plot(train_losses, label=\"Train\")\n    plt.plot(val_losses,\
          \ label=\"Val\")\n    plt.xlabel(\"Epoch\")\n    plt.ylabel(\"MSE Loss\"\
          )\n    plt.legend()\n    plt.tight_layout()\n    loss_path = Path(loss_curves_output.path)\n\
          \    loss_path.parent.mkdir(parents=True, exist_ok=True)\n    plt.savefig(loss_path,\
          \ dpi=120)\n    plt.close()\n\n    metrics = {\"train_losses\": train_losses,\
          \ \"val_losses\": val_losses, \"epochs\": len(train_losses)}\n    metrics_file\
          \ = Path(metrics_output.path)\n    metrics_file.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    metrics_file.write_text(json.dumps(metrics, indent=2),\
          \ encoding=\"utf-8\")\n\n    device = pick_device()\n    _, val_dataset,\
          \ _, _, tokenizer = build_loaders_from_manifest(Path(manifest_path.path))\n\
          \    vae, unet, text_encoder, _ = build_sd_lora_stack(device, model_id=model_id)\n\
          \    unet.load_state_dict(\n        torch.load(checkpoint_path.path, map_location=device,\
          \ weights_only=False)[\"unet_state_dict\"]\n    )\n    unet.train(False)\n\
          \n    unet_copy = copy.deepcopy(unet)\n    pipe = StableDiffusionPipeline.from_pretrained(\n\
          \        model_id,\n        vae=vae,\n        unet=unet_copy.merge_and_unload(),\n\
          \        text_encoder=text_encoder,\n        tokenizer=tokenizer,\n    \
          \    safety_checker=None,\n    ).to(device)\n    del unet_copy\n\n    def\
          \ get_val_path(index):\n        return val_dataset.dataset.image_paths[int(val_dataset.indices[index])]\n\
          \n    n_samples = min(sample_count, len(val_dataset))\n    indices = random.sample(range(len(val_dataset)),\
          \ n_samples)\n    fig, axes = plt.subplots(2, n_samples, figsize=(4 * n_samples,\
          \ 8))\n    if n_samples == 1:\n        axes = axes.reshape(2, 1)\n\n   \
          \ for col, idx in enumerate(indices):\n        path = get_val_path(idx)\n\
          \        cond = metadata_to_conditioning(get_metadata_from_png(path))\n\
          \        axes[0, col].imshow(pipe(cond, num_inference_steps=num_inference_steps,\
          \ guidance_scale=guidance_scale).images[0])\n        axes[0, col].axis(\"\
          off\")\n        axes[1, col].imshow(Image.open(path).convert(\"RGB\").resize((512,\
          \ 512)))\n        axes[1, col].axis(\"off\")\n\n    plt.tight_layout()\n\
          \    samples_file = Path(samples_output.path)\n    samples_file.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    plt.savefig(samples_file, dpi=120)\n    plt.close()\n\
          \n    out = Path(state_output.path)\n    out.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    out.write_text(json.dumps({\n        \"step\": \"\
          04_evaluation\",\n        \"checkpoint_path\": str(Path(checkpoint_path.path).resolve()),\n\
          \        \"manifest_path\": str(Path(manifest_path.path).resolve()),\n \
          \       \"model_id\": model_id,\n        \"metrics_path\": str(metrics_file.resolve()),\n\
          \        \"loss_curves_path\": str(loss_path.resolve()),\n        \"eval_samples_path\"\
          : str(samples_file.resolve()),\n        \"final_val_loss\": val_losses[-1]\
          \ if val_losses else None,\n    }, indent=2, ensure_ascii=False), encoding=\"\
          utf-8\")\n\n"
        image: python:3.11
    exec-feature-engineering-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - feature_engineering_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'spacy' 'yake'\
          \ 'pokegen-shared @ git+https://github.com/DO-2K23-26/mlops-pokegen.git'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef feature_engineering_component(\n    input_results_dataset: Input[Artifact],\n\
          \    metadata_output: Output[Artifact],\n    state_output: Output[Artifact],\n\
          \    user_prompt: str = \"A fierce fire dragon pokemon with wings and a\
          \ blazing tail attack\"\n) -> None:\n    \"\"\"Extract keywords from the\
          \ prompt and build a JSON metadata profile.\"\"\"\n    import json\n   \
          \ import subprocess\n    import sys\n    from pathlib import Path\n\n  \
          \  subprocess.run([sys.executable, \"-m\", \"spacy\", \"download\", \"en_core_web_sm\"\
          ], check=True)\n    template_json = \"\"\"{\n    \"category\": \"Pokemon\"\
          , \"name\": \"\", \"rarity\": \"\", \"hp\": \"\", \"types\": [\"\"],\n \
          \   \"evolveFrom\": \"\", \"description\": \"\", \"stage\": \"\",\n    \"\
          attacks\": [{\"cost\": [\"\"], \"name\": \"\", \"effect\": \"\"},\n    \
          \            {\"cost\": [\"\"], \"name\": \"\", \"effect\": \"\", \"damage\"\
          : 0}],\n    \"weaknesses\": [{\"type\": \"\", \"value\": \"\"}],\n    \"\
          retreat\": 0, \"regulationMark\": \"\", \"legal\": {\"standard\": true,\
          \ \"expanded\": true}\n    }\"\"\"\n    from pokegen_nlp.keyword_extractor\
          \ import KeywordExtractor\n    from pokegen_nlp.json_inference import fill_template_from_keywords\n\
          \n    with open(input_results_dataset.path) as f:\n        card_images =\
          \ json.load(f)\n    print(f\"Dataset (etape 00): {card_images}\")\n\n  \
          \  extractor = KeywordExtractor.from_default_model()\n    keywords = extractor.extract(user_prompt)\n\
          \n    template = json.loads(template_json)\n    metadata = fill_template_from_keywords(template,\
          \ keywords)\n\n    def write_json(path: str, payload: dict) -> Path:\n \
          \       p = Path(path)\n        p.parent.mkdir(parents=True, exist_ok=True)\n\
          \        p.write_text(json.dumps(payload, indent=2, ensure_ascii=False),\
          \ encoding=\"utf-8\")\n        return p\n\n    metadata_path = write_json(metadata_output.path,\
          \ metadata)\n    write_json(state_output.path, {\n        \"step\": \"01_feature_engineering\"\
          ,\n        \"input_results_dataset\": str(Path(input_results_dataset.path).resolve()),\n\
          \        \"user_prompt\": user_prompt,\n        \"keywords\": keywords,\n\
          \        \"metadata_path\": str(metadata_path.resolve()),\n    })\n\n"
        image: python:3.11
    exec-model-registry-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - model_registry_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'model-registry==0.3.9'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef model_registry_component(\n    state_output: Output[Artifact],\n\
          \    checkpoint_path: Input[Artifact],\n    evaluation_state: Input[Artifact],\n\
          \    model_name: str = \"pokegen-lora-sd15\",\n    registry_host: str =\
          \ \"http://model-registry-service.default.svc.cluster.local\",\n    registry_port:\
          \ int = 8080,\n    author: str = \"pokegen-pipeline\",\n    kubeflow_namespace:\
          \ str = \"pokegen\",\n) -> None:\n    \"\"\"Register the trained LoRA checkpoint\
          \ in the Kubeflow Model Registry.\"\"\"\n    import json\n    from pathlib\
          \ import Path\n\n    from model_registry import ModelRegistry\n\n    # Resolve\
          \ checkpoint path \u2014 two formats:\n    # 1. JSON pointer {\"checkpoint_path\"\
          : \"/data/...\"} written by the PyTorchJob launcher\n    # 2. Raw binary\
          \ .pt file written by the single-GPU train_model_component\n    _default_pvc_path\
          \ = \"/data/checkpoints/lora_checkpoint.pt\"\n    try:\n        pointer\
          \ = json.loads(Path(checkpoint_path.path).read_bytes().decode(\"utf-8\"\
          ))\n        checkpoint_pvc_path = pointer[\"checkpoint_path\"]\n    except\
          \ (UnicodeDecodeError, json.JSONDecodeError, KeyError):\n        import\
          \ shutil\n        Path(_default_pvc_path).parent.mkdir(parents=True, exist_ok=True)\n\
          \        shutil.copy2(checkpoint_path.path, _default_pvc_path)\n       \
          \ checkpoint_pvc_path = _default_pvc_path\n        print(f\"Copied binary\
          \ checkpoint to PVC: {checkpoint_pvc_path}\")\n\n    # Read evaluation results\
          \ for metadata\n    eval_state = json.loads(Path(evaluation_state.path).read_text())\n\
          \    final_val_loss = eval_state.get(\"final_val_loss\")\n    model_id =\
          \ eval_state.get(\"model_id\", \"runwayml/stable-diffusion-v1-5\")\n\n \
          \   registry = ModelRegistry(\n        server_address=registry_host,\n \
          \       port=registry_port,\n        author=author,\n        is_secure=False,\n\
          \    )\n\n    # Semantic versioning: find the next vN by probing existing\
          \ versions\n    version = \"v1\"\n    n = 1\n    while True:\n        try:\n\
          \            registry.get_model_version(model_name, f\"v{n}\")\n       \
          \     n += 1\n        except Exception:\n            version = f\"v{n}\"\
          \n            break\n\n    metadata: dict = {\"base_model\": model_id, \"\
          namespace\": kubeflow_namespace}\n    if final_val_loss is not None:\n \
          \       metadata[\"val_loss\"] = round(float(final_val_loss), 6)\n\n   \
          \ registry.register_model(\n        model_name,\n        f\"pvc://{checkpoint_pvc_path}\"\
          ,\n        model_format_name=\"pytorch\",\n        model_format_version=\"\
          2\",\n        version=version,\n        description=f\"SD 1.5 LoRA fine-tuned\
          \ on Pok\xE9mon cards \u2014 val_loss={final_val_loss:.4f}\" if final_val_loss\
          \ else \"SD 1.5 LoRA fine-tuned on Pok\xE9mon cards\",\n        metadata=metadata,\n\
          \    )\n\n    # Retrieve IDs needed for KServe InferenceService labels\n\
          \    registered_model = registry.get_registered_model(model_name)\n    model_version\
          \ = registry.get_model_version(model_name, version)\n\n    print(f\"Registered\
          \ '{model_name}' {version} (model_id={registered_model.id}, version_id={model_version.id})\"\
          )\n\n    out = Path(state_output.path)\n    out.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    out.write_text(json.dumps({\n        \"step\": \"\
          05_model_registry\",\n        \"model_name\": model_name,\n        \"version\"\
          : version,\n        \"registered_model_id\": registered_model.id,\n    \
          \    \"model_version_id\": model_version.id,\n        \"checkpoint_path\"\
          : checkpoint_pvc_path,\n        \"val_loss\": final_val_loss,\n        \"\
          registry_host\": registry_host,\n    }, indent=2, ensure_ascii=False), encoding=\"\
          utf-8\")\n\n"
        image: python:3.11
    exec-preprocessing-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - preprocessing_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'torch' 'torchvision'\
          \ 'pillow' 'transformers' 'pokegen-shared @ git+https://github.com/DO-2K23-26/mlops-pokegen.git'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocessing_component(\n    manifest_output: Output[Artifact],\n\
          \    state_output: Output[Artifact],\n    image_dir: Input[Artifact],\n\
          \    img_size: int = 512,\n    batch_size: int = 4,\n    val_fraction: float\
          \ = 0.1,\n    split_seed: int = 42,\n    num_workers: int = 0,\n) -> None:\n\
          \    \"\"\"Validate card images, build the preprocessing manifest, and write\
          \ step state.\"\"\"\n    import json\n    from pathlib import Path\n\n \
          \   from shared.pokemon_dataset import (\n        build_tokenizer_and_loaders,\n\
          \        collect_valid_image_paths,\n        pick_device,\n        save_preprocessing_manifest,\n\
          \    )\n\n    # The pull_data state JSON contains the actual cards_dir path\n\
          \    state = json.loads(Path(image_dir.path).read_text(encoding=\"utf-8\"\
          ))\n    source_dir = Path(state[\"cards_dir\"])\n\n    device = pick_device()\n\
          \    print(f\"Using device: {device}\")\n\n    image_paths = collect_valid_image_paths(source_dir)\n\
          \    print(f\"Valid images with pokemon_metadata: {len(image_paths)}\")\n\
          \n    train_dataset, val_dataset, _, _, _ = build_tokenizer_and_loaders(\n\
          \        image_dir=source_dir,\n        batch_size=batch_size,\n       \
          \ img_size=img_size,\n        val_fraction=val_fraction,\n        split_seed=split_seed,\n\
          \        num_workers=num_workers,\n    )\n\n    manifest_file = Path(manifest_output.path)\n\
          \    manifest_file.parent.mkdir(parents=True, exist_ok=True)\n    save_preprocessing_manifest(\n\
          \        manifest_file,\n        image_dir=source_dir,\n        image_paths=image_paths,\n\
          \        train_size=len(train_dataset),\n        val_size=len(val_dataset),\n\
          \        img_size=img_size,\n        batch_size=batch_size,\n        split_seed=split_seed,\n\
          \    )\n\n    out = Path(state_output.path)\n    out.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    out.write_text(json.dumps({\n        \"step\": \"\
          02_preprocessing\",\n        \"cards_dir\": str(source_dir.resolve()),\n\
          \        \"manifest_path\": str(manifest_file.resolve()),\n        \"n_images\"\
          : len(image_paths),\n        \"train_size\": len(train_dataset),\n     \
          \   \"val_size\": len(val_dataset),\n        \"img_size\": img_size,\n \
          \       \"batch_size\": batch_size,\n    }, indent=2, ensure_ascii=False),\
          \ encoding=\"utf-8\")\n    print(\"Step output saved for 02_preprocessing\"\
          )\n\n"
        image: python:3.11
    exec-pull-data-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - pull_data_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'dvc[gs,s3,ssh]'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef pull_data_component(\n    state_output: Output[Artifact],\n \
          \   repo_url: str = \"https://git.razano.dev/llabeyrie/mlops-dataset.git\"\
          ,\n    revision: str = \"main\",\n    remote_path: str = \"cards\",\n  \
          \  local_cards_dir: str = \"/tmp/data/raw/cards\",\n    aws_default_region:\
          \ str = \"auto\",\n) -> None:\n    \"\"\"Pull the card dataset from DVC-backed\
          \ storage and write the step state.\n\n    AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY\
          \ are injected as env vars\n    from a Kubernetes secret (use_secret_as_env\
          \ in the pipeline definition).\n    \"\"\"\n    import json\n    import\
          \ os\n    from pathlib import Path\n\n    from dvc.api import DVCFileSystem\n\
          \n    os.environ.setdefault(\"AWS_DEFAULT_REGION\", aws_default_region)\n\
          \n    local_dir = Path(local_cards_dir)\n    local_dir.parent.mkdir(parents=True,\
          \ exist_ok=True)\n\n    fs = DVCFileSystem(repo_url, rev=revision)\n   \
          \ fs.get(remote_path, str(local_dir), recursive=True)\n\n    n_png = len(list(fs.glob(f\"\
          {remote_path}/**/*.png\")))\n    payload = {\n        \"step\": \"00_pull_data\"\
          ,\n        \"cards_dir\": str(local_dir.resolve()),\n        \"n_png\":\
          \ n_png,\n    }\n\n    out = Path(state_output.path)\n    out.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    out.write_text(json.dumps(payload, indent=2, ensure_ascii=False),\
          \ encoding=\"utf-8\")\n    print(f\"Pull termine - {n_png} PNG sous {local_dir}\"\
          )\n\n"
        image: python:3.11
    exec-train-model-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'torch' 'transformers'\
          \ 'diffusers' 'peft' 'pillow' 'tqdm' 'pokegen-shared @ git+https://github.com/DO-2K23-26/mlops-pokegen.git'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model_component(\n    checkpoint_output: Output[Artifact],\n\
          \    state_output: Output[Artifact],\n    manifest_path: Input[Artifact],\n\
          \    model_id: str = \"runwayml/stable-diffusion-v1-5\",\n    epochs: int\
          \ = 1,\n    lr: float = 1e-5,\n    fraction: float = 1.0,\n    seed: int\
          \ = 42,\n    batch_size: int = 4,\n    num_workers: int = 0,\n) -> None:\n\
          \    \"\"\"Train the LoRA U-Net, persist the checkpoint, and write step\
          \ state.\"\"\"\n    import json\n    from pathlib import Path\n\n    import\
          \ numpy as np\n    import torch\n    from torch.optim import AdamW\n   \
          \ from torch.utils.data import DataLoader, Subset\n    from tqdm import\
          \ tqdm\n\n    from shared.pokemon_dataset import build_loaders_from_manifest,\
          \ pick_device\n    from shared.sd_lora_models import build_sd_lora_stack\n\
          \n    train_dataset, val_dataset, _, _, _ = build_loaders_from_manifest(Path(manifest_path.path))\n\
          \n    def make_subset(dataset, subset_fraction, subset_seed):\n        rng\
          \ = np.random.default_rng(subset_seed)\n        size = len(dataset)\n  \
          \      indices = rng.permutation(size)[: max(1, int(size * subset_fraction))]\n\
          \        return Subset(dataset, indices)\n\n    train_small = make_subset(train_dataset,\
          \ fraction, seed)\n    val_small = make_subset(val_dataset, fraction, seed\
          \ + 1)\n\n    train_loader = DataLoader(train_small, batch_size=batch_size,\
          \ shuffle=True, num_workers=num_workers)\n    val_loader = DataLoader(val_small,\
          \ batch_size=batch_size, shuffle=False, num_workers=num_workers)\n\n   \
          \ device = pick_device()\n    vae, unet, text_encoder, noise_scheduler =\
          \ build_sd_lora_stack(device, model_id=model_id)\n    optimizer = AdamW(unet.parameters(),\
          \ lr=lr)\n\n    checkpoint_file = Path(checkpoint_output.path)\n    checkpoint_file.parent.mkdir(parents=True,\
          \ exist_ok=True)\n\n    train_losses: list = []\n    val_losses: list =\
          \ []\n    start_epoch = 0\n\n    if checkpoint_file.exists():\n        ckpt\
          \ = torch.load(checkpoint_file, map_location=device, weights_only=False)\n\
          \        unet.load_state_dict(ckpt[\"unet_state_dict\"])\n        optimizer.load_state_dict(ckpt[\"\
          optimizer_state_dict\"])\n        start_epoch = ckpt[\"epoch\"]\n      \
          \  train_losses = ckpt[\"train_losses\"]\n        val_losses = ckpt[\"val_losses\"\
          ]\n        print(f\"Resuming from epoch {start_epoch}\")\n\n    def encode_prompt(encoder,\
          \ input_ids, attention_mask):\n        with torch.no_grad():\n         \
          \   return encoder(input_ids, attention_mask=attention_mask)[0]\n\n    for\
          \ epoch in range(start_epoch, epochs):\n        unet.train()\n        running\
          \ = 0.0\n        for batch in tqdm(train_loader, desc=f\"Train {epoch +\
          \ 1}/{epochs}\"):\n            pv = batch[\"pixel_values\"].to(device)\n\
          \            ids = batch[\"input_ids\"].to(device)\n            mask = batch[\"\
          attention_mask\"].to(device)\n            with torch.no_grad():\n      \
          \          latents = vae.encode(pv).latent_dist.sample() * 0.18215\n   \
          \         enc = encode_prompt(text_encoder, ids, mask)\n            noise\
          \ = torch.randn_like(latents)\n            bs = latents.shape[0]\n     \
          \       t = torch.randint(0, noise_scheduler.config.num_train_timesteps,\
          \ (bs,), device=device).long()\n            noisy = noise_scheduler.add_noise(latents,\
          \ noise, t)\n            pred = unet(noisy, t, enc).sample\n           \
          \ loss = torch.nn.functional.mse_loss(pred.float(), noise.float())\n   \
          \         optimizer.zero_grad()\n            loss.backward()\n         \
          \   torch.nn.utils.clip_grad_norm_(unet.parameters(), 1.0)\n           \
          \ optimizer.step()\n            running += loss.item() * bs\n        train_losses.append(running\
          \ / len(train_small))\n\n        unet.train(False)\n        running = 0.0\n\
          \        with torch.no_grad():\n            for batch in val_loader:\n \
          \               pv = batch[\"pixel_values\"].to(device)\n              \
          \  ids = batch[\"input_ids\"].to(device)\n                mask = batch[\"\
          attention_mask\"].to(device)\n                latents = vae.encode(pv).latent_dist.sample()\
          \ * 0.18215\n                enc = encode_prompt(text_encoder, ids, mask)\n\
          \                noise = torch.randn_like(latents)\n                bs =\
          \ latents.shape[0]\n                t = torch.randint(0, noise_scheduler.config.num_train_timesteps,\
          \ (bs,), device=device).long()\n                noisy = noise_scheduler.add_noise(latents,\
          \ noise, t)\n                pred = unet(noisy, t, enc).sample\n       \
          \         running += torch.nn.functional.mse_loss(pred.float(), noise.float()).item()\
          \ * bs\n        val_losses.append(running / len(val_small))\n        print(f\"\
          Epoch {epoch + 1}: train={train_losses[-1]:.4f} val={val_losses[-1]:.4f}\"\
          )\n\n        torch.save({\n            \"epoch\": epoch + 1,\n         \
          \   \"unet_state_dict\": unet.state_dict(),\n            \"optimizer_state_dict\"\
          : optimizer.state_dict(),\n            \"train_losses\": train_losses,\n\
          \            \"val_losses\": val_losses,\n            \"model_id\": model_id,\n\
          \        }, checkpoint_file)\n\n    out = Path(state_output.path)\n    out.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    out.write_text(json.dumps({\n        \"step\": \"\
          03_train_model\",\n        \"manifest_path\": str(Path(manifest_path.path).resolve()),\n\
          \        \"checkpoint_path\": str(checkpoint_file.resolve()),\n        \"\
          model_id\": model_id,\n        \"epochs_done\": len(train_losses),\n   \
          \     \"final_train_loss\": train_losses[-1] if train_losses else None,\n\
          \        \"final_val_loss\": val_losses[-1] if val_losses else None,\n \
          \   }, indent=2, ensure_ascii=False), encoding=\"utf-8\")\n\n"
        image: python:3.11
        resources:
          accelerator:
            count: '1'
            resourceCount: '1'
            resourceType: nvidia.com/gpu
            type: nvidia.com/gpu
          cpuRequest: 12.0
          memoryRequest: 34.359738368
          resourceCpuRequest: '12'
          resourceMemoryRequest: 32Gi
pipelineInfo:
  description: "SD 1.5 LoRA fine-tune on Pok\xE9mon cards \u2014 pull \u2192 FE \u2192\
    \ preprocess \u2192 train \u2192 eval"
  name: pokegen-mlops
root:
  dag:
    tasks:
      evaluation-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluation-component
        dependentTasks:
        - preprocessing-component
        - train-model-component
        inputs:
          artifacts:
            checkpoint_path:
              taskOutputArtifact:
                outputArtifactKey: checkpoint_output
                producerTask: train-model-component
            manifest_path:
              taskOutputArtifact:
                outputArtifactKey: manifest_output
                producerTask: preprocessing-component
          parameters:
            guidance_scale:
              componentInputParameter: guidance_scale
            model_id:
              componentInputParameter: model_id
            num_inference_steps:
              componentInputParameter: num_inference_steps
            sample_count:
              componentInputParameter: sample_count
        taskInfo:
          name: evaluation-component
      feature-engineering-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-feature-engineering-component
        dependentTasks:
        - pull-data-component
        inputs:
          artifacts:
            input_results_dataset:
              taskOutputArtifact:
                outputArtifactKey: state_output
                producerTask: pull-data-component
          parameters:
            user_prompt:
              componentInputParameter: user_prompt
        taskInfo:
          name: feature-engineering-component
      model-registry-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-model-registry-component
        dependentTasks:
        - evaluation-component
        - train-model-component
        inputs:
          artifacts:
            checkpoint_path:
              taskOutputArtifact:
                outputArtifactKey: checkpoint_output
                producerTask: train-model-component
            evaluation_state:
              taskOutputArtifact:
                outputArtifactKey: state_output
                producerTask: evaluation-component
        taskInfo:
          name: model-registry-component
      preprocessing-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-preprocessing-component
        dependentTasks:
        - feature-engineering-component
        - pull-data-component
        inputs:
          artifacts:
            image_dir:
              taskOutputArtifact:
                outputArtifactKey: state_output
                producerTask: pull-data-component
          parameters:
            batch_size:
              componentInputParameter: batch_size
            img_size:
              componentInputParameter: img_size
            split_seed:
              componentInputParameter: split_seed
            val_fraction:
              componentInputParameter: val_fraction
        taskInfo:
          name: preprocessing-component
      pull-data-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-pull-data-component
        inputs:
          parameters:
            local_cards_dir:
              runtimeValue:
                constant: /data/raw/cards
            repo_url:
              componentInputParameter: repo_url
            revision:
              componentInputParameter: revision
        taskInfo:
          name: pull-data-component
      train-model-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-model-component
        dependentTasks:
        - preprocessing-component
        inputs:
          artifacts:
            manifest_path:
              taskOutputArtifact:
                outputArtifactKey: manifest_output
                producerTask: preprocessing-component
          parameters:
            batch_size:
              componentInputParameter: batch_size
            epochs:
              componentInputParameter: epochs
            fraction:
              componentInputParameter: train_fraction
            lr:
              componentInputParameter: lr
            model_id:
              componentInputParameter: model_id
        taskInfo:
          name: train-model-component
  inputDefinitions:
    parameters:
      batch_size:
        defaultValue: 4.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      cards_pvc_name:
        defaultValue: pokegen-data
        isOptional: true
        parameterType: STRING
      epochs:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      guidance_scale:
        defaultValue: 7.5
        isOptional: true
        parameterType: NUMBER_DOUBLE
      img_size:
        defaultValue: 512.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      lr:
        defaultValue: 1.0e-05
        isOptional: true
        parameterType: NUMBER_DOUBLE
      model_id:
        defaultValue: runwayml/stable-diffusion-v1-5
        isOptional: true
        parameterType: STRING
      num_inference_steps:
        defaultValue: 10.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      r2_secret_name:
        defaultValue: cloudflare-r2-keys
        isOptional: true
        parameterType: STRING
      repo_url:
        defaultValue: https://git.razano.dev/llabeyrie/mlops-dataset.git
        isOptional: true
        parameterType: STRING
      revision:
        defaultValue: main
        isOptional: true
        parameterType: STRING
      sample_count:
        defaultValue: 4.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      split_seed:
        defaultValue: 42.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      train_fraction:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_DOUBLE
      user_prompt:
        defaultValue: A fierce fire dragon pokemon with wings and a blazing tail attack
        isOptional: true
        parameterType: STRING
